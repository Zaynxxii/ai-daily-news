<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Daily News - 2026-03-09</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        header .date { font-size: 1.2em; opacity: 0.9; }
        
        /* 日期选择器 */
        .date-selector {
            text-align: center;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.15);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        .date-selector label {
            color: white;
            margin-right: 10px;
            font-size: 1.1em;
        }
        .date-selector select {
            padding: 10px 20px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            background: white;
            color: #333;
            cursor: pointer;
            min-width: 150px;
        }
        
        /* 卡片样式 */
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .card h2 { 
            color: #667eea; 
            margin-bottom: 20px; 
            font-size: 1.5em;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        .card h3 { 
            color: #764ba2; 
            margin: 20px 0 10px 0; 
            font-size: 1.2em; 
        }
        .card p { margin-bottom: 12px; line-height: 1.8; }
        .card ul { margin-left: 25px; margin-bottom: 15px; }
        .card li { margin-bottom: 10px; line-height: 1.7; }
        .card strong { color: #667eea; }
        .card a { color: #667eea; text-decoration: none; }
        .card a:hover { text-decoration: underline; }
        
        /* Top 3 特殊样式 */
        .top-3 { 
            border-left: 5px solid #FFD700;
            background: linear-gradient(to right, #fff9e6, white);
        }
        .top-3 h2::before {
            content: '🏆 ';
        }
        
        /* 数据概览样式 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .stat-item {
            background: linear-gradient(135deg, #667eea20, #764ba220);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-item strong {
            display: block;
            font-size: 1.3em;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        /* 分类标签 */
        .category-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.85em;
            margin-right: 8px;
            color: white;
            font-weight: bold;
        }
        .tag-ai { background: #e74c3c; }
        .tag-apple { background: #95a5a6; }
        .tag-projects { background: #27ae60; }
        .tag-other { background: #9b59b6; }
        
        /* 趋势观察 */
        .trend-item {
            padding: 15px;
            margin-bottom: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        .trend-item h4 {
            color: #667eea;
            margin-bottom: 8px;
            font-size: 1.1em;
        }
        
        footer { 
            text-align: center; 
            color: rgba(255,255,255,0.7); 
            margin-top: 40px; 
            padding: 20px; 
        }
        footer a { color: rgba(255,255,255,0.9); }
        
        /* 响应式 */
        @media (max-width: 768px) {
            header h1 { font-size: 2em; }
            .card { padding: 20px; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📰 AI Daily News</h1>
            <div class="date">2026-03-09</div>
        </header>
        
        <div class="date-selector">
            <label for="date-select">📅 选择日期：</label>
            <select id="date-select" onchange="changeDate(this.value)">
                <option value="2026-03-09" selected>今天 (03月09日)</option>
                <option value="2026-03-08">03月08日</option>
                <option value="2026-03-07">03月07日</option>
                <option value="2026-03-06">03月06日</option>
                <option value="2026-03-05">03月05日</option>
                <option value="2026-03-04">03月04日</option>
                <option value="2026-03-03">03月03日</option>
            </select>
        </div>

        <div class="card top-3">
            <h2>今日必读 Top 3</h2>

        </div>

        <div class="card">
            <h2>📊 数据概览</h2>
<div class="stats-content">

</div>
        </div>

        <div class="card">
            <h2>📝 完整列表</h2>

        </div>

        <div class="card">
            <h2>🔥 趋势观察</h2>

        </div>

        <footer>
            <p>Generated by OpenClaw | 数据保留 7 天 | 
            <a href="https://github.com/Zaynxxii/ai-daily-news">GitHub</a></p>
        </footer>
    </div>
    
    <script>
        function changeDate(date) {
            if (date === '2026-03-09') {
                window.location.href = '../index.html';
            } else {
                window.location.href = date + '.html';
            }
        }
    </script>
</body>
</html>
